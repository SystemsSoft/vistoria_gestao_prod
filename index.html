<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Sistema de Gestão de Vistorias">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="VistoriaGestão">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">

  <!-- Theme color -->
  <meta name="theme-color" content="#1565C0">
  <meta name="msapplication-TileColor" content="#1565C0">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>VistoriaGestão</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // ── PWA Install Prompt ──────────────────────────────────────────
    window.pwaInstallEvent = null;

    // Android / Chrome: captura o evento antes de o browser descartá-lo
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      window.pwaInstallEvent = e;
      // Notifica o Flutter quando estiver pronto
      if (window.onPwaInstallReady) window.onPwaInstallReady();
    });

    // Disparado pelo Flutter para abrir o prompt nativo (Android)
    window.triggerPwaInstall = function() {
      if (window.pwaInstallEvent) {
        window.pwaInstallEvent.prompt();
        window.pwaInstallEvent.userChoice.then(function(result) {
          if (result.outcome === 'accepted') {
            window.pwaInstallEvent = null;
          }
        });
        return true;
      }
      return false;
    };

    // Retorna true se o prompt nativo está disponível (Android)
    window.isPwaInstallable = function() {
      return !!window.pwaInstallEvent;
    };

    // Detecta iOS (Safari)
    window.isIos = function() {
      return /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());
    };

    // Detecta se já está rodando como app instalado
    window.isInStandaloneMode = function() {
      return (window.navigator.standalone === true) ||
             window.matchMedia('(display-mode: standalone)').matches;
    };

    // Detecta mobile (iOS ou Android)
    window.isMobileDevice = function() {
      return /android|iphone|ipad|ipod|mobile/i.test(window.navigator.userAgent);
    };
    // ───────────────────────────────────────────────────────────────
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
